<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FrameWire</title>
<style>
  /* Trebuchet MS — system font, matches the existing FrameWire surfaces */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --fw-bg: #05060A;
    --fw-fg: #f4f6fb;
    --fw-muted: #aab1c2;
    --fw-dim: #6b7488;
    --fw-blue: #2f7fe0;
    --fw-sans: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
  }

  html { background: var(--fw-bg); }
  body {
    background: var(--fw-bg);
    color: var(--fw-muted);
    font-family: var(--fw-sans);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 32px 20px;
    /* a single, almost-invisible pool of brand light behind the motto —
       kept faint so the canvas still reads as flat near-black */
    background-image:
      radial-gradient(ellipse 46% 38% at 50% 47%,
        rgba(47, 127, 224, 0.07) 0%,
        rgba(47, 127, 224, 0.02) 45%,
        transparent 72%);
  }

  /* ============ central lockup — occupies a small share of the viewport ============ */
  .center {
    position: relative;
    z-index: 2;
    width: min(560px, 88vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* --- logo --- */
  .mark {
    width: 50px;
    height: auto;
    margin-bottom: 30px;
    opacity: 0;
    transform: scale(0.96);
    filter: drop-shadow(0 0 18px rgba(47, 127, 224, 0.45));
    animation: markIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards,
               breathe 6s ease-in-out 1.8s infinite;
  }

  /* --- headline motto --- */
  .motto {
    font-family: var(--fw-sans);
    font-weight: 700;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.08;
    letter-spacing: -0.015em;
    color: var(--fw-fg);
    opacity: 0;
    animation: lensIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.45s forwards;
  }

  /* --- four-word sequence --- */
  .sequence {
    margin-top: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    font-size: clamp(11px, 1.5vw, 13px);
    font-weight: 700;
    letter-spacing: 0.34em;
    text-transform: uppercase;
  }
  .sequence .word {
    color: #97a0b4;
    opacity: 0;
    transform: translateY(4px);
    animation: wordIn 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .sequence .word:last-child { color: var(--fw-blue); }
  .sequence .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--fw-blue);
    margin: 0 0.7em;
    opacity: 0;
    animation: wordIn 0.6s ease forwards;
  }
  .w1 { animation-delay: 1.10s; } .d1 { animation-delay: 1.28s; }
  .w2 { animation-delay: 1.46s; } .d2 { animation-delay: 1.64s; }
  .w3 { animation-delay: 1.82s; } .d3 { animation-delay: 2.00s; }
  .w4 { animation-delay: 2.18s; }

  /* --- quiet links to the tours --- */
  .links {
    margin-top: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    opacity: 0;
    animation: fadeUp 0.9s ease 2.6s forwards;
  }
  .links a {
    font-family: var(--fw-sans);
    font-size: 14px;
    letter-spacing: 0.02em;
    color: var(--fw-muted);
    text-decoration: none;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(170, 177, 194, 0.28);
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .links a:hover {
    color: var(--fw-fg);
    border-bottom-color: var(--fw-blue);
  }
  .links .div {
    width: 1px;
    height: 13px;
    background: rgba(170, 177, 194, 0.22);
  }

  /* --- beta invitation note + link (beneath the tour links) --- */
  .beta-note {
    margin-top: 40px;
    max-width: 400px;
    font-family: var(--fw-sans);
    font-size: 13px;
    line-height: 1.6;
    letter-spacing: 0.01em;
    color: var(--fw-blue);
    opacity: 0;
    animation: fadeUp 0.9s ease 3.0s forwards;
  }
  .beta-btn {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--fw-sans);
    font-size: 14px;
    letter-spacing: 0.02em;
    color: var(--fw-muted);
    text-decoration: none;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(170, 177, 194, 0.28);
    opacity: 0;
    animation: fadeUp 0.9s ease 3.25s forwards;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .beta-btn:hover {
    color: var(--fw-fg);
    border-bottom-color: var(--fw-blue);
  }
  .beta-arrow { font-size: 14px; line-height: 1; transition: transform 0.2s ease; }
  .beta-btn:hover .beta-arrow { transform: translateX(3px); }

  /* ============ keyframes ============ */
  @keyframes markIn {
    0%   { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes lensIn {
    0%   { opacity: 0; filter: blur(12px); transform: scale(0.97); }
    100% { opacity: 1; filter: blur(0);    transform: scale(1); }
  }
  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* ============ guaranteed-visible fallback ============
     Entrance animations start at opacity:0; if the animation timeline is
     paused (e.g. the page loads in a background tab), a setTimeout adds
     .fw-ready and these !important rules — which outrank paused animations
     in the cascade — force the final visible state. */
  body.fw-ready .motto,
  body.fw-ready .sequence .word,
  body.fw-ready .sequence .dot,
  body.fw-ready .links,
  body.fw-ready .beta-note,
  body.fw-ready .beta-btn { opacity: 1 !important; transform: none !important; filter: none !important; }
  body.fw-ready .mark  { opacity: 1 !important; }

  @media (prefers-reduced-motion: reduce) {
    .mark, .motto, .sequence .word, .sequence .dot, .links, .beta-note, .beta-btn { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
    .mark { filter: drop-shadow(0 0 18px rgba(47, 127, 224, 0.45)) !important; }
  }

  @media (max-width: 600px) {
    .center { width: 100%; }
    .mark { width: 44px; margin-bottom: 24px; }
    .motto { font-size: clamp(26px, 8.5vw, 38px); }
    .sequence {
      margin-top: 18px;
      font-size: 11px;
      letter-spacing: 0.18em;
      line-height: 1.9;
    }
    .sequence .dot { margin: 0 0.5em; }
    .links {
      margin-top: 44px;
      flex-direction: column;
      gap: 10px;
    }
    .links .div { display: none; }
    /* keep the underline tight to the word, add breathing room for touch */
    .links a { padding-top: 4px; padding-bottom: 4px; }
    .links a:active { color: var(--fw-fg); border-bottom-color: var(--fw-blue); }
    .beta-note { margin-top: 28px; font-size: 13px; }
    .beta-btn { margin-top: 16px; padding-top: 4px; padding-bottom: 4px; }
    .beta-btn:active { color: var(--fw-fg); border-bottom-color: var(--fw-blue); }
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#05060A">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#05060A"/>
      <g transform="translate(600 360)" fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
        <path d="M0 -120 L104 -60 L104 60 L0 120 L-104 60 L-104 -60 Z"/>
        <path d="M0 -70 L60 -35 L60 35 L0 70 L-60 35 L-60 -35 Z" stroke="#2f7fe0"/>
      </g>
      <text x="600" y="560" text-anchor="middle" fill="#f4f6fb" font-family="'Trebuchet MS',sans-serif" font-size="56" font-weight="700">Understand Before Concluding</text>
      <text x="600" y="620" text-anchor="middle" fill="#2f7fe0" font-family="'Trebuchet MS',sans-serif" font-size="22" font-weight="700" letter-spacing="8">OBSERVE · QUESTION · INVESTIGATE · UNDERSTAND</text>
    </svg>
  </template>
  <main class="center" data-screen-label="Landing">
    <img class="mark" src="assets/framewire-logo-white.png" alt="FrameWire" />

    <h1 class="motto">Understand Before Concluding</h1>

    <div class="sequence" aria-label="Observe, Question, Investigate, Understand">
      <span class="word w1">Observe</span>
      <span class="dot d1"></span>
      <span class="word w2">Question</span>
      <span class="dot d2"></span>
      <span class="word w3">Investigate</span>
      <span class="dot d3"></span>
      <span class="word w4">Understand</span>
    </div>

    <nav class="links">
      <a href="Guided Tour.html">Guided Tour</a>
      <span class="div"></span>
      <a href="Technical Tour.html">Technical Tour</a>
    </nav>

    <p class="beta-note">Please consider watching the guided and technical tours before applying for the beta.</p>

    <a class="beta-btn" href="FrameWire Beta.html">Apply for Beta <span class="beta-arrow">&rarr;</span></a>
  </main>

  <script>
    // Failsafe reveal: fires even when the tab is backgrounded (setTimeout is
    // not frame-locked), so the page is never stuck blank past the entrance.
    setTimeout(function () { document.body.classList.add('fw-ready'); }, 3000);
  </script>
</body>
</html>
