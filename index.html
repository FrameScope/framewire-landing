document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>FrameWire<\u002Ftitle>\n<style>\n  /* Trebuchet MS — system font, matches the existing FrameWire surfaces */\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  :root {\n    --fw-bg: #05060A;\n    --fw-fg: #f4f6fb;\n    --fw-muted: #aab1c2;\n    --fw-dim: #6b7488;\n    --fw-blue: #2f7fe0;\n    --fw-sans: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;\n  }\n\n  html { background: var(--fw-bg); }\n  body {\n    background: var(--fw-bg);\n    color: var(--fw-muted);\n    font-family: var(--fw-sans);\n    min-height: 100vh;\n    min-height: 100dvh;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow-x: hidden;\n    overflow-y: auto;\n    padding: 32px 20px;\n    /* a single, almost-invisible pool of brand light behind the motto —\n       kept faint so the canvas still reads as flat near-black */\n    background-image:\n      radial-gradient(ellipse 46% 38% at 50% 47%,\n        rgba(47, 127, 224, 0.07) 0%,\n        rgba(47, 127, 224, 0.02) 45%,\n        transparent 72%);\n  }\n\n  /* ============ central lockup — occupies a small share of the viewport ============ */\n  .center {\n    position: relative;\n    z-index: 2;\n    width: min(560px, 88vw);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    text-align: center;\n  }\n\n  /* --- logo --- */\n  .mark {\n    width: 50px;\n    height: auto;\n    margin-bottom: 30px;\n    opacity: 0;\n    transform: scale(0.96);\n    filter: drop-shadow(0 0 18px rgba(47, 127, 224, 0.45));\n    animation: markIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards,\n               breathe 6s ease-in-out 1.8s infinite;\n  }\n\n  /* --- headline motto --- */\n  .motto {\n    font-family: var(--fw-sans);\n    font-weight: 700;\n    font-size: clamp(28px, 5vw, 46px);\n    line-height: 1.08;\n    letter-spacing: -0.015em;\n    color: var(--fw-fg);\n    opacity: 0;\n    animation: lensIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.45s forwards;\n  }\n\n  /* --- four-word sequence --- */\n  .sequence {\n    margin-top: 22px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-wrap: wrap;\n    font-size: clamp(11px, 1.5vw, 13px);\n    font-weight: 700;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n  }\n  .sequence .word {\n    color: #97a0b4;\n    opacity: 0;\n    transform: translateY(4px);\n    animation: wordIn 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;\n  }\n  .sequence .word:last-child { color: var(--fw-blue); }\n  .sequence .dot {\n    display: inline-block;\n    width: 3px;\n    height: 3px;\n    border-radius: 50%;\n    background: var(--fw-blue);\n    margin: 0 0.7em;\n    opacity: 0;\n    animation: wordIn 0.6s ease forwards;\n  }\n  .w1 { animation-delay: 1.10s; } .d1 { animation-delay: 1.28s; }\n  .w2 { animation-delay: 1.46s; } .d2 { animation-delay: 1.64s; }\n  .w3 { animation-delay: 1.82s; } .d3 { animation-delay: 2.00s; }\n  .w4 { animation-delay: 2.18s; }\n\n  /* --- quiet links to the tours --- */\n  .links {\n    margin-top: 58px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 30px;\n    opacity: 0;\n    animation: fadeUp 0.9s ease 2.6s forwards;\n  }\n  .links a {\n    font-family: var(--fw-sans);\n    font-size: 14px;\n    letter-spacing: 0.02em;\n    color: var(--fw-muted);\n    text-decoration: none;\n    padding-bottom: 3px;\n    border-bottom: 1px solid rgba(170, 177, 194, 0.28);\n    transition: color 0.25s ease, border-color 0.25s ease;\n  }\n  .links a:hover {\n    color: var(--fw-fg);\n    border-bottom-color: var(--fw-blue);\n  }\n  .links .div {\n    width: 1px;\n    height: 13px;\n    background: rgba(170, 177, 194, 0.22);\n  }\n\n  /* --- beta invitation note + link (beneath the tour links) --- */\n  .beta-note {\n    margin-top: 40px;\n    max-width: 400px;\n    font-family: var(--fw-sans);\n    font-size: 13px;\n    line-height: 1.6;\n    letter-spacing: 0.01em;\n    color: var(--fw-blue);\n    opacity: 0;\n    animation: fadeUp 0.9s ease 3.0s forwards;\n  }\n  .beta-btn {\n    margin-top: 18px;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    font-family: var(--fw-sans);\n    font-size: 14px;\n    letter-spacing: 0.02em;\n    color: var(--fw-muted);\n    text-decoration: none;\n    padding-bottom: 3px;\n    border-bottom: 1px solid rgba(170, 177, 194, 0.28);\n    opacity: 0;\n    animation: fadeUp 0.9s ease 3.25s forwards;\n    transition: color 0.25s ease, border-color 0.25s ease;\n  }\n  .beta-btn:hover {\n    color: var(--fw-fg);\n    border-bottom-color: var(--fw-blue);\n  }\n  .beta-arrow { font-size: 14px; line-height: 1; transition: transform 0.2s ease; }\n  .beta-btn:hover .beta-arrow { transform: translateX(3px); }\n\n  /* ============ keyframes ============ */\n  @keyframes markIn {\n    0%   { opacity: 0; transform: scale(0.96); }\n    100% { opacity: 1; transform: scale(1); }\n  }\n  @keyframes lensIn {\n    0%   { opacity: 0; filter: blur(12px); transform: scale(0.97); }\n    100% { opacity: 1; filter: blur(0);    transform: scale(1); }\n  }\n  @keyframes wordIn {\n    to { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes fadeUp {\n    0%   { opacity: 0; transform: translateY(8px); }\n    100% { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes breathe {\n    0%, 100% { transform: translateY(0); }\n    50%      { transform: translateY(-3px); }\n  }\n\n  /* ============ guaranteed-visible fallback ============\n     Entrance animations start at opacity:0; if the animation timeline is\n     paused (e.g. the page loads in a background tab), a setTimeout adds\n     .fw-ready and these !important rules — which outrank paused animations\n     in the cascade — force the final visible state. */\n  body.fw-ready .motto,\n  body.fw-ready .sequence .word,\n  body.fw-ready .sequence .dot,\n  body.fw-ready .links,\n  body.fw-ready .beta-note,\n  body.fw-ready .beta-btn { opacity: 1 !important; transform: none !important; filter: none !important; }\n  body.fw-ready .mark  { opacity: 1 !important; }\n\n  @media (prefers-reduced-motion: reduce) {\n    .mark, .motto, .sequence .word, .sequence .dot, .links, .beta-note, .beta-btn { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }\n    .mark { filter: drop-shadow(0 0 18px rgba(47, 127, 224, 0.45)) !important; }\n  }\n\n  @media (max-width: 600px) {\n    .center { width: 100%; }\n    .mark { width: 44px; margin-bottom: 24px; }\n    .motto { font-size: clamp(26px, 8.5vw, 38px); }\n    .sequence {\n      margin-top: 18px;\n      font-size: 11px;\n      letter-spacing: 0.18em;\n      line-height: 1.9;\n    }\n    .sequence .dot { margin: 0 0.5em; }\n    .links {\n      margin-top: 44px;\n      flex-direction: column;\n      gap: 10px;\n    }\n    .links .div { display: none; }\n    /* keep the underline tight to the word, add breathing room for touch */\n    .links a { padding-top: 4px; padding-bottom: 4px; }\n    .links a:active { color: var(--fw-fg); border-bottom-color: var(--fw-blue); }\n    .beta-note { margin-top: 28px; font-size: 13px; }\n    .beta-btn { margin-top: 16px; padding-top: 4px; padding-bottom: 4px; }\n    .beta-btn:active { color: var(--fw-fg); border-bottom-color: var(--fw-blue); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <main class=\"center\" data-screen-label=\"Landing\">\n    <img class=\"mark\" src=\"93c758ec-09a1-4cbd-bf16-501937072b69\" alt=\"FrameWire\">\n\n    <h1 class=\"motto\">Understand Before Concluding<\u002Fh1>\n\n    <div class=\"sequence\" aria-label=\"Observe, Question, Investigate, Understand\">\n      <span class=\"word w1\">Observe<\u002Fspan>\n      <span class=\"dot d1\"><\u002Fspan>\n      <span class=\"word w2\">Question<\u002Fspan>\n      <span class=\"dot d2\"><\u002Fspan>\n      <span class=\"word w3\">Investigate<\u002Fspan>\n      <span class=\"dot d3\"><\u002Fspan>\n      <span class=\"word w4\">Understand<\u002Fspan>\n    <\u002Fdiv>\n\n    <nav class=\"links\">\n      <a href=\"Guided Tour.html\">Guided Tour<\u002Fa>\n      <span class=\"div\"><\u002Fspan>\n      <a href=\"Technical Tour.html\">Technical Tour<\u002Fa>\n    <\u002Fnav>\n\n    <p class=\"beta-note\">Please consider watching the guided and technical tours before applying for the beta.<\u002Fp>\n\n    <a class=\"beta-btn\" href=\"FrameWire Beta.html\">Apply for Beta <span class=\"beta-arrow\">→<\u002Fspan><\u002Fa>\n  <\u002Fmain>\n\n  <script>\n    // Failsafe reveal: fires even when the tab is backgrounded (setTimeout is\n    // not frame-locked), so the page is never stuck blank past the entrance.\n    setTimeout(function () { document.body.classList.add('fw-ready'); }, 3000);\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
